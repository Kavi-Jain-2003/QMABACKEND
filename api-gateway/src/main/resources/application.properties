spring.application.name=API-GATEWAY
server.port=${PORT:8080}

# Routes - User Service
spring.cloud.gateway.routes[0].id=USER-SERVICE
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# Routes - Measurement Service
spring.cloud.gateway.routes[1].id=MEASUREMENT-SERVICE
spring.cloud.gateway.routes[1].uri=lb://MEASUREMENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/measurement/**
spring.cloud.gateway.routes[1].filters[0]=PreserveHostHeader
spring.cloud.gateway.routes[1].filters[1]=RemoveRequestHeader=Cookie

# Routes - User Service Docs
spring.cloud.gateway.routes[2].id=USER-SERVICE-DOCS
spring.cloud.gateway.routes[2].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/user-service/v3/api-docs,/user-service/v3/api-docs/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# Routes - Measurement Service Docs
spring.cloud.gateway.routes[3].id=MEASUREMENT-SERVICE-DOCS
spring.cloud.gateway.routes[3].uri=lb://MEASUREMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/measurement-service/v3/api-docs,/measurement-service/v3/api-docs/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# CORS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=${ALLOWED_ORIGINS:http://localhost:4200}
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods[0]=GET
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods[1]=POST
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods[2]=PUT
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods[3]=DELETE
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

# Springdoc
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

springdoc.swagger-ui.urls[0].name=user-service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs

springdoc.swagger-ui.urls[1].name=measurement-service
springdoc.swagger-ui.urls[1].url=/measurement-service/v3/api-docs
